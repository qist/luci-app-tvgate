name: Build TVGate

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }} - OpenWrt ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        version:
          - 22.03.5
          - 25.12.0-rc2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev liblua5.3-dev

      # ------------------ 缓存 SDK + downloads ------------------
      - name: Restore SDK cache
        id: cache
        uses: actions/cache@v3
        with:
          path: |
            $HOME/openwrt-sdk-*/staging_dir
            $HOME/openwrt-sdk-*/downloads
          key: ${{ runner.os }}-openwrt-sdk-v2-${{ matrix.version }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-sdk-v2-${{ matrix.version }}-

      # ------------------ 下载并解压 SDK（仅缓存未命中时执行） ------------------
      - name: Download and extract OpenWrt SDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          if [[ "${{ matrix.version }}" == "22.03.5" ]]; then
            SDK_URL=https://downloads.openwrt.org/releases/22.03.5/targets/x86/64/openwrt-sdk-22.03.5-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
            wget $SDK_URL
            tar -xvf openwrt-sdk-22.03.5-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz -C $HOME
          else
            cd $HOME
            SDK_URL=https://downloads.openwrt.org/releases/25.12.0-rc2/targets/x86/64/openwrt-sdk-25.12.0-rc2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            wget $SDK_URL
            tar -I zstd -xf openwrt-sdk-25.12.0-rc2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          fi

      # ------------------ 设置 SDK_DIR 环境变量 ------------------
      - name: Set SDK_DIR
        run: |
          SDK_DIR=$(find $HOME -maxdepth 1 -type d -name "openwrt-sdk*")
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "SDK_DIR=$SDK_DIR"

      # ------------------ 清理旧的 build_dir ------------------
      - name: Clean build_dir
        run: |
          rm -rf $SDK_DIR/build_dir
          mkdir -p $SDK_DIR/build_dir

      # ------------------ 生成 defconfig ------------------
      - name: Generate defconfig
        run: |
          cd $SDK_DIR
          make defconfig

      # ------------------ 克隆 luci-app-tvgate ------------------
      - name: Clone luci-app-tvgate
        run: |
          cd $SDK_DIR
          # SDK 自带的 feeds 已包含 luci-base 等依赖，无需更新
          git clone https://github.com/qist/luci-app-tvgate package/luci-app-tvgate || true
          cd package/luci-app-tvgate && git pull
          ls -la $SDK_DIR/package/luci-app-tvgate/Makefile

      # ------------------ 读取版本 ------------------
      - name: Read PKG_VERSION from Makefile
        run: |
          PKG_VERSION=$(grep "^PKG_VERSION:=" $SDK_DIR/package/luci-app-tvgate/Makefile | cut -d= -f2 | tr -d ' ')
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
          echo "Detected PKG_VERSION=$PKG_VERSION"

      # ------------------ 编译 luci-app-tvgate ------------------
      - name: Build luci-app-tvgate
        env:
          FORCE_UNSAFE_CONFIGURE: 1
        run: |
          cd $SDK_DIR
          make package/luci-app-tvgate/compile V=s

      # ------------------ 收集生成的 ipk/apk ------------------
      - name: Collect artifact files
        id: collect_files
        run: |
          ARTIFACT_DIR="$SDK_DIR/bin/packages/x86_64/luci"
          FILES=()
          if [[ "${{ matrix.version }}" == "22.03.5" ]]; then
            FILES+=($ARTIFACT_DIR/luci-app-tvgate*.ipk $ARTIFACT_DIR/luci-i18n-tvgate*.ipk)
          else
            FILES+=($ARTIFACT_DIR/luci-app-tvgate*.apk $ARTIFACT_DIR/luci-i18n-tvgate*.apk)
          fi

          EXISTING_FILES=()
          for f in "${FILES[@]}"; do
            if [[ -f "$f" ]]; then
              EXISTING_FILES+=("$f")
            fi
          done

          if [ ${#EXISTING_FILES[@]} -eq 0 ]; then
            echo "No artifact files found!"
          else
            echo "Artifact files to upload:"
            for f in "${EXISTING_FILES[@]}"; do
              echo " - $f"
            done
          fi

          echo "artifact_files=${EXISTING_FILES[*]}" >> $GITHUB_OUTPUT

      # ------------------ 上传 artifacts ------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.version }}-v${{ env.PKG_VERSION }}
          path: ${{ steps.collect_files.outputs.artifact_files }}
